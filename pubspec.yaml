name: focusshield
description: FocusShield 2.0 — AI-driven digital wellbeing app.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  firebase_app_check: ^0.3.1+3
  firebase_remote_config: ^5.1.3

  # State Management & DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.3.0

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # ML
  tflite_flutter: ^0.10.4

  # Networking
  http: ^1.2.2
  dio: ^5.7.0

  # UI & Charts
  fl_chart: ^0.69.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  lottie: ^3.1.2
  confetti: ^0.7.0

  # Permissions & Device
  permission_handler: ^11.3.1
  app_usage: ^3.0.1

  # Notifications
  flutter_local_notifications: ^17.2.3

  # Background Tasks
  workmanager: ^0.5.2

  # Security
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.5

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  supabase_flutter: ^2.12.4
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  # Note: isar_generator 3.x conflicts with modern freezed/riverpod_generator
  # due to analyzer version constraints. Run code generation in a separate step:
  #   flutter pub add dev:isar_generator:^3.1.0+1 --no-example
  #   flutter pub run build_runner build
  # then restore these dev deps for normal development.
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
  fake_async: ^1.3.1

flutter:
  uses-material-design: true

  assets:
    - assets/ml/
    - assets/images/
    - assets/animations/
